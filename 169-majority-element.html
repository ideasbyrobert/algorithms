<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majority Element — Boyer-Moore Voting</title>
<link rel="stylesheet" href="shared/viz/viz-system.css">
<style>
.vote-panel {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 12px;
}
.vote-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 1.5px solid #C7C7CC;
    background: #FFFFFF;
    transition: border-color 0.25s ease, background 0.25s ease;
    min-width: 80px;
}
.vote-box.active { border-color: #1D1D1F; background: #F5F5F7; }
.vote-box.restart { border-color: #1D1D1F; background: #1D1D1F; }
.vote-box.restart .vote-val { color: #FFFFFF; }
.vote-box.restart .vote-lbl { color: #AEAEB2; }
.vote-lbl {
    font: 500 10px/1 'SF Pro Text', -apple-system, sans-serif;
    color: #8E8E93; letter-spacing: 0.5px; text-transform: uppercase;
}
.vote-val {
    font: 600 20px/1 'Menlo', monospace;
    color: #1D1D1F; transition: color 0.25s ease;
}
@media (max-width: 600px) {
    .vote-box { padding: 8px 14px; min-width: 64px; }
    .vote-val { font-size: 17px; }
}
</style>
<meta name="description" content="Interactive visualization of LeetCode 169 Majority Element. Watch Boyer-Moore voting track candidate and balance.">
<link rel="canonical" href="https://ideasbyrobert.github.io/algorithms/169-majority-element.html">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Majority Element — Interactive Visualization">
<meta property="og:type" content="article">
<meta property="og:url" content="https://ideasbyrobert.github.io/algorithms/169-majority-element.html">
<meta property="og:image" content="https://ideasbyrobert.github.io/algorithms/default.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=&apos;http://www.w3.org/2000/svg&apos; viewBox=&apos;0 0 100 100&apos;><text y=&apos;.9em&apos; font-size=&apos;90&apos;>&#x1f9ee;</text></svg>">
<script type="application/ld+json">
</head>
<body>
<main class="page">

    <!-- ── Hero ── -->

    <section class="hero hero-full">
        <span class="label">Majority Element · Optimal Solution</span>
        <h1>A candidate that survives cancellation.</h1>
        <p class="hero-text">
            Find the element that appears more than ⌊n/2⌋ times. The voting
        algorithm needs only one pass and O(1) space — no hash map, no
        sorting.
        </p>
    </section>

    <hr class="divider">

    <!-- ── Interactive Visualization ── -->

    <section>
        <span class="label">Interactive</span>
        <h2>Watch the algorithm run</h2>
        <div id="interactiveMount"></div>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Concept</span>
        <h2>Candidate and Balance</h2>
        <p class="section-intro">
        Maintain a <em>candidate</em> and a <em>balance counter</em>.
        When balance hits zero, adopt the current value as the new
        candidate. Matching values reinforce (balance++); mismatches
        cancel (balance−−). The true majority always survives because
        it can't be fully cancelled.
        </p>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Algorithm</span>
        <h2>Algorithm</h2>
        <div class="viz-code-block">
        <pre><code>candidate ← null, balance ← 0
        for each value:
        if balance == 0:
        candidate ← value, balance ← 1
        else if value == candidate:
        balance += 1
        else:
        balance -= 1
        return candidate</code></pre>
        </div>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Edge Cases</span>
        <h2>Edge Patterns</h2>
        <p class="section-intro">
        <strong>Immediate restart</strong> — when balance drops to zero
        mid-array, the next element becomes the new candidate.<br><br>
        <strong>Uniform array</strong> — balance simply increments every
        step; no cancellation occurs.<br><br>
        <strong>Guarantee</strong> — Boyer-Moore only works when a majority
        is guaranteed to exist. Without that guarantee, a verification
        pass is needed.
        </p>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Complexity</span>
        <h2>Complexity</h2>
        <p class="section-intro">
        <strong>Time:</strong> O(n) — single pass.<br>
        <strong>Space:</strong> O(1) — two variables.
        </p>
    </section>

    <footer class="page-footer">
        <p>Built by <a href="https://github.com/features/copilot" target="_blank" rel="noopener">GitHub Copilot</a></p>
    </footer>

</main>

<script src="shared/viz/viz-engine.js"></script>
<script src="shared/viz/viz-array.js"></script>
<script src="shared/viz/viz-page.js"></script>
<script>

var refs = VizPage.createInteractive(document.getElementById("interactiveMount"), {
    legend: [{ dot: true, label: "current element" }],
    gridClass: "viz-array",
    status: [
        { id: "action", label: "Action" },
        { id: "balance", label: "Balance" }
    ],
    values: [],
    showOrder: false
});

/* Vote panel */
var vp = document.createElement("div");
vp.innerHTML =
    '<div class="vote-panel">' +
    '<div class="vote-box" id="candBox"><span class="vote-lbl">Candidate</span><span class="vote-val" id="candVal">\u2014</span></div>' +
    '<div class="vote-box" id="balBox"><span class="vote-lbl">Balance</span><span class="vote-val" id="balVal">0</span></div>' +
    '</div>';
refs.grid.parentNode.insertBefore(vp, refs.grid);
var candBox = document.getElementById("candBox");
var balBox = document.getElementById("balBox");
var candVal = document.getElementById("candVal");
var balVal = document.getElementById("balVal");

var PRESETS = [
    { name: "[2,2,1,1,1,2,2]", data: [2,2,1,1,1,2,2] },
    { name: "[3,2,3,3]", mobileDefault: true, data: [3,2,3,3] },
    { name: "[3,3,4,3,4,3,3]", data: [3,3,4,3,4,3,3] },
    { name: "[1,1,1,1,1]", data: [1,1,1,1,1] },
    { name: "[1,2,1,2,1]", data: [1,2,1,2,1] },
    { name: "[7]", data: [7] }
];

function buildTrace(preset) {
    var nums = preset.data;
    var steps = [];
    var candidate = null, balance = 0;

    for (var i = 0; i < nums.length; i++) {
        var v = nums[i];
        var action;
        if (balance === 0) {
            candidate = v; balance = 1; action = "restart";
        } else if (v === candidate) {
            balance++; action = "reinforce";
        } else {
            balance--; action = "cancel";
        }
        steps.push({ index: i, value: v, candidate: candidate, balance: balance, action: action });
    }

    return { steps: steps, nums: nums };
}

function onRender(engine) {
    var pos = engine.position;
    var trace = engine.trace;
    var step = pos >= 0 ? trace.steps[pos] : null;

    var highlights = new Map();
    if (step) highlights.set(step.index, "current");
    VizArray.renderCells(refs.grid, { array: trace.nums, highlights: highlights });

    candVal.textContent = step ? step.candidate : "\u2014";
    balVal.textContent = step ? step.balance : "0";

    candBox.className = "vote-box" + (step && step.action === "restart" ? " restart" : step ? " active" : "");
    balBox.className = "vote-box" + (step ? " active" : "");

    if (step) {
        var labels = { restart: "New candidate", reinforce: "Reinforce +1", cancel: "Cancel \u22121" };
        refs.status.action.textContent = labels[step.action];
        refs.status.balance.textContent = step.balance;
    } else {
        refs.status.action.textContent = "\u2014";
        refs.status.balance.textContent = "0";
    }
}

function describeStep(engine) {
    if (engine.position < 0) return "Ready \u2014 press Play or Next";
    var s = engine.currentStep();
    if (s.action === "restart") return "balance=0 \u2192 adopt " + s.value + " as candidate (balance=1)";
    if (s.action === "reinforce") return s.value + " matches candidate \u2192 balance=" + s.balance;
    return s.value + " \u2260 " + s.candidate + " \u2192 cancel, balance=" + s.balance;
}

var engine = VizEngine.create({
    presets: PRESETS,
    buildTrace: buildTrace,
    onRender: onRender,
    describeStep: describeStep,
    speed: 450
});
engine.init();
VizEngine.onResize(function() { if (engine.trace) onRender(engine); });

</script>
</body>
</html>
