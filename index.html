<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Array Operations</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f5f5f7;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6e6e73;
      --border: rgba(17, 17, 17, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: linear-gradient(180deg, #ffffff 0%, var(--background) 100%);
      color: var(--text);
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 680px);
      padding: 56px 48px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.25rem, 5vw, 3.75rem);
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .link-list {
      display: grid;
      gap: 16px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fafafa;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    a:hover {
      transform: translateY(-1px);
      border-color: rgba(17, 17, 17, 0.16);
      background: #f0f0f0;
    }

    .link-meta {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
      }

      main {
        padding: 36px 24px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Arrays and Strings</h1>
    <p>Array Operations</p>
    <div class="link-list">
      <a href="88-merge-sorted-array.html">
        <span>88 Merge Sorted Array</span>
        <span class="link-meta">Open</span>
      </a>
      <a href="169-majority-element.html">
        <span>169 Majority Element</span>
        <span class="link-meta">Open</span>
      </a>
      <a href="189-rotate-array.html">
        <span>189 Rotate Array</span>
        <span class="link-meta">Open</span>
      </a>
      <a href="274-hindex.html">
        <span>274 H-Index</span>
        <span class="link-meta">Open</span>
      </a>
    </div>
  </main>
</body>
</html>
