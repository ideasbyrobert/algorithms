<body>
<main class="page">

    <!-- ── Hero ── -->

    <section class="hero hero-full">
        <span class="label">Rotate Array · Optimal Solution</span>
        <h1>Three reversals compose a rotation.</h1>
        <p class="hero-text">
            Rotate an array to the right by k steps. Instead of shifting
        elements one at a time (O(n·k)), reverse three segments in
        O(n) total — the whole array, the front k, then the back n−k.
        </p>
    </section>

    <hr class="divider">

    <!-- ── Interactive Visualization ── -->

    <section>
        <span class="label">Interactive</span>
        <h2>Watch the algorithm run</h2>
        <div id="interactiveMount"></div>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Concept</span>
        <h2>Three Reversals</h2>
        <p class="section-intro">
        <strong>Step 1:</strong> Reverse the entire array — this puts
        the tail block (which should move to front) into position, but
        both blocks are backwards.<br>
        <strong>Step 2:</strong> Reverse the first k elements — fixes
        the front block.<br>
        <strong>Step 3:</strong> Reverse the remaining n−k elements —
        fixes the back block.
        </p>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Algorithm</span>
        <h2>Algorithm</h2>
        <div class="viz-code-block">
        <pre><code>k ← k % n
        reverse(0, n - 1)     // whole array
        reverse(0, k - 1)     // front block
        reverse(k, n - 1)     // back block</code></pre>
        </div>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Edge Cases</span>
        <h2>Edge Patterns</h2>
        <p class="section-intro">
        <strong>k ≥ n</strong> — normalize: k = k % n. Rotating by
        the full length is a no-op.<br><br>
        <strong>k = 0</strong> — array unchanged; skip all reversals.<br><br>
        <strong>Each reversal</strong> is a two-pointer swap from
        endpoints inward — O(segment length/2) swaps.
        </p>
    </section>

    <hr class="divider">

    <section>
        <span class="label">Complexity</span>
        <h2>Complexity</h2>
        <p class="section-intro">
        <strong>Time:</strong> O(n) — each element touched at most twice.<br>
        <strong>Space:</strong> O(1) — in-place swaps.
        </p>
    </section>

    <footer class="page-footer">
        <p>Built by <a href="https://github.com/features/copilot" target="_blank" rel="noopener">GitHub Copilot</a></p>
    </footer>

</main>

<script src="shared/viz/viz-engine.js"></script>
<script src="shared/viz/viz-array.js"></script>
<script src="shared/viz/viz-page.js"></script>
<script>

var refs = VizPage.createInteractive(document.getElementById("interactiveMount"), {
    legend: [{ dot: true, label: "swap pair" }],
    gridClass: "viz-array",
    status: [
        { id: "phase", label: "Phase" },
        { id: "swap",  label: "Swap" }
    ],
    values: [],
    showOrder: false
});

/* Phase badge */
var pbWrap = document.createElement("div");
pbWrap.style.textAlign = "center";
pbWrap.innerHTML = '<span class="phase-badge" id="phaseBadge">Initial</span>';
refs.grid.parentNode.insertBefore(pbWrap, refs.grid);
var phaseBadge = document.getElementById("phaseBadge");

var PRESETS = [
    { name: "[1,2,3,4,5,6,7] k=3", data: { nums: [1,2,3,4,5,6,7], k: 3 } },
    { name: "[1,2,3,4] k=2", mobileDefault: true, data: { nums: [1,2,3,4], k: 2 } },
    { name: "[-1,-100,3,99] k=2", data: { nums: [-1,-100,3,99], k: 2 } },
    { name: "[1,2,3,4,5] k=1", data: { nums: [1,2,3,4,5], k: 1 } },
    { name: "[1,2,3,4,5,6] k=6", data: { nums: [1,2,3,4,5,6], k: 6 } },
    { name: "[1,2] k=1", data: { nums: [1,2], k: 1 } }
];

function buildTrace(preset) {
    var d = preset.data;
    var nums = d.nums.slice();
    var n = nums.length;
    var k = d.k % n;
    var steps = [];

    function rev(arr, l, r, phase) {
        while (l < r) {
            var tmp = arr[l]; arr[l] = arr[r]; arr[r] = tmp;
            steps.push({ array: arr.slice(), left: l, right: r, phase: phase });
            l++; r--;
        }
    }

    if (k > 0) {
        rev(nums, 0, n - 1, "Reverse all");
        rev(nums, 0, k - 1, "Reverse front " + k);
        rev(nums, k, n - 1, "Reverse back " + (n - k));
    }

    return { steps: steps, k: k, original: d.nums.slice() };
}

function onRender(engine) {
    var pos = engine.position;
    var trace = engine.trace;
    var step = pos >= 0 ? trace.steps[pos] : null;
    var arr = step ? step.array : trace.original;

    var highlights = new Map();
    if (step) {
        highlights.set(step.left, "current");
        highlights.set(step.right, "current");
    }
    VizArray.renderCells(refs.grid, { array: arr, highlights: highlights });

    var phase = step ? step.phase : "Initial";
    phaseBadge.textContent = phase;
    phaseBadge.className = "phase-badge" + (step ? " active" : "");

    if (step) {
        refs.status.phase.textContent = step.phase;
        refs.status.swap.textContent = "[" + step.left + "] \u21C4 [" + step.right + "]";
    } else {
        refs.status.phase.textContent = trace.k === 0 ? "k=0, no rotation" : "Ready";
        refs.status.swap.textContent = "\u2014";
    }
}

function describeStep(engine) {
    if (engine.position < 0) return "Ready \u2014 press Play or Next";
    var s = engine.currentStep();
    return s.phase + ": swap [" + s.left + "] \u21C4 [" + s.right + "]";
}

var engine = VizEngine.create({
    presets: PRESETS,
    buildTrace: buildTrace,
    onRender: onRender,
    describeStep: describeStep,
    speed: 350
});
engine.init();
VizEngine.onResize(function() { if (engine.trace) onRender(engine); });

</script>
</body>
</html>
